<ion-header>
  <ion-toolbar class="bg-transparent text-neon-cyan" style="--background: transparent;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="primary" class="text-neon-cyan"></ion-back-button>
    </ion-buttons>
    <ion-title class="font-bold">Reles</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openRules()" class="text-neon-cyan">
        <ion-icon slot="start" name="flash"></ion-icon>
        Regras
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="relative text-text-main" style="--background: #05161A;">
  <div class="fixed inset-0 w-full h-full z-0 pointer-events-none">
    <img src="assets/backeground.png" class="w-full h-full object-cover" alt="Background">
    <div class="absolute inset-0 bg-gradient-to-b from-[#05161A]/60 via-[#05161A]/80 to-[#05161A]"></div>
  </div>

  <div class="relative z-10">
    <section class="px-5 pt-6 pb-4">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h1 class="text-xl font-bold text-text-main">Controle de reles</h1>
          <p class="text-sm text-text-muted">Acione os equipamentos auxiliares do aquario.</p>
        </div>
        <button type="button"
          class="border border-neon-cyan text-neon-cyan rounded-xl px-4 py-2 text-sm font-semibold transition hover:bg-neon-cyan/10 disabled:opacity-60 disabled:cursor-not-allowed"
          (click)="loadRelays()" [disabled]="loading">
          Atualizar
        </button>
      </div>
    </section>

    <p class="px-5 text-sm text-red-400" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="px-5 pb-8 space-y-4">
      <div *ngFor="let relay of relays"
        class="bg-black/40 backdrop-blur-md rounded-2xl shadow-lg border border-white/10 p-4 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-12 h-12 rounded-full flex items-center justify-center border transition-colors"
            [ngClass]="relay.state ? 'bg-neon-cyan/15 border-neon-cyan/40' : 'bg-white/5 border-white/10'">
            <ion-icon name="power-outline" class="text-2xl"
              [ngClass]="relay.state ? 'text-neon-cyan' : 'text-white/40'"></ion-icon>
          </div>
          <div class="min-w-0">
            <p class="text-base font-bold text-white/90 truncate">{{ relay.name }}</p>
            <p class="text-sm font-semibold" [ngClass]="relay.state ? 'text-neon-cyan' : 'text-white/50'">
              {{ relay.state ? 'LIGADO' : 'DESLIGADO' }}
            </p>
            <p *ngIf="relay.timerRemaining > 0" class="text-xs text-amber-400 flex items-center gap-1 mt-0.5">
              <ion-icon name="timer-outline"></ion-icon>
              Religa em {{ formatTimer(relay.timerRemaining) }}
            </p>
          </div>
        </div>

        <ion-toggle [checked]="relay.state" [disabled]="relay.busy" color="success"
          (ionChange)="toggleRelay(relay, $any($event).detail.checked)"></ion-toggle>
      </div>

      <div *ngIf="!relays.length && !loading" class="text-center text-white/50 text-sm py-10">
        Nenhum rele disponivel. Toque em Atualizar.
      </div>
    </div>
  </div>

  <ion-toast [isOpen]="toastOpen" [message]="toastMessage" [duration]="2500"
    (didDismiss)="toastOpen = false"></ion-toast>
</ion-content>
